---
# oauth2-proxy paths — no auth annotation, these ARE the auth flow
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oauth2-proxy
  namespace: dark-factory
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dqaifactory.ru
      secretName: dark-factory-tls
  rules:
    - host: dqaifactory.ru
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 4180
---
# Application routes — protected by oauth2-proxy
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dark-factory
  namespace: dark-factory
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.dark-factory.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://dqaifactory.ru/oauth2/sign_in?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dqaifactory.ru
        - studio.dqaifactory.ru
        - tickets.dqaifactory.ru
      secretName: dark-factory-tls
  rules:
    - host: dqaifactory.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uim-frontend
                port:
                  number: 80
    - host: studio.dqaifactory.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uim-frontend
                port:
                  number: 80
    - host: tickets.dqaifactory.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tm-frontend
                port:
                  number: 80
