apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dark-factory
  namespace: dark-factory
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Validate all /api/* requests via oauth2-proxy (preserves Principle IX auth semantics)
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.dark-factory.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - studio.dark-factory.local
        - tickets.dark-factory.local
      secretName: dark-factory-tls
  rules:
    - host: studio.dark-factory.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uim-frontend
                port:
                  number: 80
    - host: tickets.dark-factory.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tm-frontend
                port:
                  number: 80
