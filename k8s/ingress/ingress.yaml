apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dark-factory
  namespace: dark-factory
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.dark-factory.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://dqaifactory.ru/oauth2/sign_in?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups"
    # Exclude oauth2-proxy paths from the auth check
    nginx.ingress.kubernetes.io/configuration-snippet: |
      location ~* ^/oauth2 {
        auth_request off;
        proxy_pass http://oauth2-proxy.dark-factory.svc.cluster.local:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dqaifactory.ru
        - studio.dqaifactory.ru
        - tickets.dqaifactory.ru
      secretName: dark-factory-tls
  rules:
    - host: dqaifactory.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uim-frontend
                port:
                  number: 80
    - host: studio.dqaifactory.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uim-frontend
                port:
                  number: 80
    - host: tickets.dqaifactory.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tm-frontend
                port:
                  number: 80
