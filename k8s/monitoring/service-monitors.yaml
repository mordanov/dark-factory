---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: user-input-manager
  namespace: dark-factory
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: user-input-manager
  namespaceSelector:
    matchNames:
      - dark-factory
  endpoints:
    - port: http
      path: /metrics
      interval: 30s

