apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-manager
  namespace: dark-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticket-manager
  template:
    metadata:
      labels:
        app: ticket-manager
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: ticket-manager
          image: ghcr.io/mordanov/ticket-manager
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: dark-factory-secrets
          env:
            - name: _DB_USER
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: TM_DB_USER
            - name: _DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: TM_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(_DB_USER):$(_DB_PASSWORD)@postgres:5432/df_ticket_manager"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
