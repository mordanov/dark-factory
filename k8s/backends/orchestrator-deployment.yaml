apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: dark-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: orchestrator
          image: ghcr.io/mordanov/orchestrator
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: dark-factory-secrets
          env:
            - name: _DB_USER
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: ORCH_DB_USER
            - name: _DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: ORCH_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(_DB_USER):$(_DB_PASSWORD)@postgres:5432/df_orchestrator"
            - name: DATABASE_URL_SYNC
              value: "postgresql://$(_DB_USER):$(_DB_PASSWORD)@postgres:5432/df_orchestrator"
            - name: KEYCLOAK_CLIENT_ID
              value: "orchestrator"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: KC_ORCHESTRATOR_CLIENT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
