apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-input-manager
  namespace: dark-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-input-manager
  template:
    metadata:
      labels:
        app: user-input-manager
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: user-input-manager
          image: ghcr.io/mordanov/user-input-manager:ae67fe562bf07f9d590346ad64afed8791d162de
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: dark-factory-secrets
          env:
            - name: _DB_USER
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: UIM_DB_USER
            - name: _DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: UIM_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(_DB_USER):$(_DB_PASSWORD)@postgres:5432/df_user_input"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
