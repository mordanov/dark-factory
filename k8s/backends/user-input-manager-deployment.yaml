apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-input-manager
  namespace: dark-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-input-manager
  template:
    metadata:
      labels:
        app: user-input-manager
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: user-input-manager
          image: ghcr.io/mordanov/user-input-manager:ae67fe562bf07f9d590346ad64afed8791d162de
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: dark-factory-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
