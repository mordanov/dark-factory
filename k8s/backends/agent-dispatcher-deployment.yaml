apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-dispatcher
  namespace: dark-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-dispatcher
  template:
    metadata:
      labels:
        app: agent-dispatcher
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: agent-dispatcher
          image: ghcr.io/mordanov/agent-dispatcher
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: dark-factory-secrets
          env:
            - name: _DB_USER
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: DISPATCHER_DB_USER
            - name: _DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: DISPATCHER_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(_DB_USER):$(_DB_PASSWORD)@postgres:5432/df_dispatcher"
            - name: AGENT_REGISTRY_PATH
              value: /app/development/agents/registry.yaml
            - name: KEYCLOAK_CLIENT_ID
              value: "agent-dispatcher"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: KC_DISPATCHER_CLIENT_SECRET
          volumeMounts:
            - name: agent-registry
              mountPath: /app/development/agents/registry.yaml
              subPath: registry.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: agent-registry
          configMap:
            name: agent-registry
