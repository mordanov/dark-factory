apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-dispatcher
  namespace: dark-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-dispatcher
  template:
    metadata:
      labels:
        app: agent-dispatcher
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: agent-dispatcher
          image: ghcr.io/mordanov/agent-dispatcher
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: dark-factory-secrets
          volumeMounts:
            - name: agent-registry
              mountPath: /app/development/agents/registry.yaml
              subPath: registry.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: agent-registry
          configMap:
            name: agent-registry
