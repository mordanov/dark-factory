apiVersion: apps/v1
kind: Deployment
metadata:
  name: context-distiller
  namespace: dark-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: context-distiller
  template:
    metadata:
      labels:
        app: context-distiller
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: context-distiller
          image: ghcr.io/mordanov/context-distiller
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: dark-factory-secrets
          env:
            - name: _DB_USER
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: DISTILLER_DB_USER
            - name: _DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: DISTILLER_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(_DB_USER):$(_DB_PASSWORD)@postgres:5432/df_distiller"
            - name: KEYCLOAK_CLIENT_ID
              value: "context-distiller"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: KC_DISTILLER_CLIENT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
