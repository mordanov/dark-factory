apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-tools
  namespace: dark-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-tools
  template:
    metadata:
      labels:
        app: agent-tools
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: agent-tools
          image: ghcr.io/mordanov/agent-tools
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: dark-factory-secrets
          env:
            - name: KEYCLOAK_CLIENT_ID
              value: "agent-tools"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dark-factory-secrets
                  key: KC_AGENT_TOOLS_CLIENT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
