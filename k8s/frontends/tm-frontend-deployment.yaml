apiVersion: apps/v1
kind: Deployment
metadata:
  name: tm-frontend
  namespace: dark-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tm-frontend
  template:
    metadata:
      labels:
        app: tm-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: tm-frontend
          image: ghcr.io/OWNER/tm-frontend:REPLACE_SHA
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
