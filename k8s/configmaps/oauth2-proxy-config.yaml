apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-config
  namespace: dark-factory
data:
  config.cfg: |
    provider = "keycloak-oidc"
    client_id = "oauth2-proxy"
    oidc_issuer_url = "https://dqaifactory.ru/realms/dark-factory"

    skip_oidc_discovery = true
    login_url = "https://dqaifactory.ru/realms/dark-factory/protocol/openid-connect/auth"
    redeem_url = "http://keycloak:8080/realms/dark-factory/protocol/openid-connect/token"
    oidc_jwks_url = "http://keycloak:8080/realms/dark-factory/protocol/openid-connect/certs"

    scope = "openid email profile"
    oidc_groups_claim = ""

    set_xauthrequest = true
    pass_user_headers = true
    pass_access_token = false

    skip_auth_routes = ["^/favicon\\.ico$"]
    session_cookie_minimal = true

    email_domains = ["*"]

    upstreams = ["http://127.0.0.1:4181"]
    http_address = "0.0.0.0:4180"

    skip_jwt_bearer_tokens = true

    cookie_secure = true
    cookie_name = "_oauth2_proxy_df"
