apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: dark-factory
data:
  realm-export.json: |
    {
      "realm": "dark-factory",
      "enabled": true,
      "registrationAllowed": false,
      "resetPasswordAllowed": true,
      "bruteForceProtected": true,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "sslRequired": "external",
      "accessTokenLifespan": 300,
      "ssoSessionMaxLifespan": 36000,
      "ssoSessionIdleTimeout": 1800,
      "roles": {
        "realm": [
          {
            "name": "user",
            "description": "Default role assigned to all accounts"
          },
          {
            "name": "administrator",
            "description": "Grants access to Keycloak Admin Console link in sidebar"
          }
        ]
      },
      "defaultRoles": [
        "user"
      ],
      "clients": [
        {
          "clientId": "uim-frontend",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "attributes": {
            "pkce.code.challenge.method": "S256"
          },
          "redirectUris": [
            "${UIM_FRONTEND_URL}/*"
          ],
          "webOrigins": [
            "${UIM_FRONTEND_URL}"
          ]
        },
        {
          "clientId": "tm-frontend",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "attributes": {
            "pkce.code.challenge.method": "S256"
          },
          "redirectUris": [
            "${TM_FRONTEND_URL}/*"
          ],
          "webOrigins": [
            "${TM_FRONTEND_URL}"
          ]
        },
        {
          "clientId": "oauth2-proxy",
          "enabled": true,
          "publicClient": false,
          "secret": "${OAUTH2_PROXY_CLIENT_SECRET}",
          "standardFlowEnabled": false,
          "serviceAccountsEnabled": false
        },
        {
          "clientId": "orchestrator",
          "enabled": true,
          "publicClient": false,
          "secret": "${KC_ORCHESTRATOR_CLIENT_SECRET}",
          "serviceAccountsEnabled": true,
          "standardFlowEnabled": false,
          "attributes": {
            "access.token.lifespan": "3600"
          }
        },
        {
          "clientId": "context-distiller",
          "enabled": true,
          "publicClient": false,
          "secret": "${KC_DISTILLER_CLIENT_SECRET}",
          "serviceAccountsEnabled": true,
          "standardFlowEnabled": false,
          "attributes": {
            "access.token.lifespan": "3600"
          }
        },
        {
          "clientId": "agent-dispatcher",
          "enabled": true,
          "publicClient": false,
          "secret": "${KC_DISPATCHER_CLIENT_SECRET}",
          "serviceAccountsEnabled": true,
          "standardFlowEnabled": false,
          "attributes": {
            "access.token.lifespan": "3600"
          }
        },
        {
          "clientId": "agent-tools",
          "enabled": true,
          "publicClient": false,
          "secret": "${KC_AGENT_TOOLS_CLIENT_SECRET}",
          "serviceAccountsEnabled": true,
          "standardFlowEnabled": false,
          "attributes": {
            "access.token.lifespan": "3600"
          }
        },
        {
          "clientId": "user-input-manager",
          "enabled": true,
          "publicClient": false,
          "secret": "${KC_UIM_CLIENT_SECRET}",
          "serviceAccountsEnabled": true,
          "standardFlowEnabled": false,
          "attributes": {
            "access.token.lifespan": "3600"
          }
        },
        {
          "clientId": "ticket-manager",
          "enabled": true,
          "publicClient": false,
          "secret": "${KC_TM_CLIENT_SECRET}",
          "serviceAccountsEnabled": true,
          "standardFlowEnabled": false,
          "attributes": {
            "access.token.lifespan": "3600"
          }
        }
      ],
      "identityProviders": [
        {
          "alias": "google",
          "displayName": "Google",
          "providerId": "google",
          "enabled": false,
          "trustEmail": true,
          "config": {
            "clientId": "${GOOGLE_CLIENT_ID}",
            "clientSecret": "${GOOGLE_CLIENT_SECRET}",
            "defaultScope": "openid email profile",
            "useJwksUrl": "true"
          }
        }
      ],
      "users": [
        {
          "username": "${KC_BOOTSTRAP_ADMIN_USERNAME}",
          "email": "${KC_BOOTSTRAP_ADMIN_EMAIL}",
          "enabled": true,
          "emailVerified": true,
          "realmRoles": [
            "administrator",
            "user"
          ],
          "credentials": [
            {
              "type": "password",
              "value": "${KC_BOOTSTRAP_ADMIN_PASSWORD}",
              "temporary": false
            }
          ],
          "firstName": "Admin",
          "lastName": "User",
          "clientRoles": {
            "realm-management": [
              "realm-admin"
            ]
          }
        }
      ]
    }
  substitute-env.sh: |
    #!/bin/bash
    set -e
    INPUT="/opt/keycloak-import-src/realm-export.json"
    OUTPUT="/opt/keycloak/data/import/realm.json"

    mkdir -p "$(dirname "$OUTPUT")"
    cp "$INPUT" "$OUTPUT"

    for var in \
      KC_BOOTSTRAP_ADMIN_USERNAME KC_BOOTSTRAP_ADMIN_EMAIL KC_BOOTSTRAP_ADMIN_PASSWORD \
      OAUTH2_PROXY_CLIENT_SECRET KC_ORCHESTRATOR_CLIENT_SECRET KC_DISTILLER_CLIENT_SECRET \
      KC_DISPATCHER_CLIENT_SECRET KC_AGENT_TOOLS_CLIENT_SECRET KC_UIM_CLIENT_SECRET \
      KC_TM_CLIENT_SECRET GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET \
      UIM_FRONTEND_URL TM_FRONTEND_URL; do
      eval "val=\$$var"
      escaped=$(printf '%s' "$val" | sed 's/[&/\]/\\&/g')
      sed -i "s|\${${var}}|${escaped}|g" "$OUTPUT"
    done

    echo "[Keycloak] Realm JSON substituted → $OUTPUT"
