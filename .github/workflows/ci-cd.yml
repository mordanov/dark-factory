name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ─── Stage 1: Detect changed services ────────────────────────────────────────
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout (depth 2 for diff)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 2

      - name: Run change detection
        id: detect
        run: |
          chmod +x .github/scripts/detect-changes.sh
          SERVICES=$(.github/scripts/detect-changes.sh)
          echo "services=${SERVICES}" >> "$GITHUB_OUTPUT"
          if [ "$SERVICES" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed services: ${SERVICES}"

  # ─── Stage 2: Validate (ruff + docker build) ─────────────────────────────────
  validate:
    name: Validate (${{ matrix.service }})
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate service name against allowlist
        run: |
          SERVICE="${{ matrix.service }}"
          ALLOWED="uim-backend tm-backend orchestrator context-distiller agent-dispatcher agent-tools uim-frontend tm-frontend nginx"
          if ! echo "$ALLOWED" | grep -qw "$SERVICE"; then
            echo "ERROR: Unknown service name '${SERVICE}' — rejecting to prevent shell injection"
            exit 1
          fi

      - name: Resolve service paths
        id: paths
        run: |
          chmod +x .github/scripts/service-to-path.sh
          COMPOSE_SERVICE=$(.github/scripts/service-to-path.sh "${{ matrix.service }}" | head -1)
          BUILD_PATH=$(.github/scripts/service-to-path.sh "${{ matrix.service }}" | tail -1)
          echo "compose_service=${COMPOSE_SERVICE}" >> "$GITHUB_OUTPUT"
          echo "build_path=${BUILD_PATH}" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.12
        if: >
          contains(fromJSON('["uim-backend","tm-backend","orchestrator","context-distiller","agent-dispatcher","agent-tools"]'), matrix.service)
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install ruff
        if: >
          contains(fromJSON('["uim-backend","tm-backend","orchestrator","context-distiller","agent-dispatcher","agent-tools"]'), matrix.service)
        run: pip install ruff==0.8.3

      - name: Run ruff check
        if: >
          contains(fromJSON('["uim-backend","tm-backend","orchestrator","context-distiller","agent-dispatcher","agent-tools"]'), matrix.service)
        run: ruff check ${{ steps.paths.outputs.build_path }}

      - name: Run ruff format check
        if: >
          contains(fromJSON('["uim-backend","tm-backend","orchestrator","context-distiller","agent-dispatcher","agent-tools"]'), matrix.service)
        run: ruff format --check ${{ steps.paths.outputs.build_path }}

      - name: Build Docker image
        run: |
          docker build --no-cache \
            -f ${{ steps.paths.outputs.build_path }}/Dockerfile \
            ${{ steps.paths.outputs.build_path }}

  # ─── Stage 3: Test (pytest / vitest) ─────────────────────────────────────────
  test:
    name: Test (${{ matrix.service }})
    needs: [detect, validate]
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate service name against allowlist
        run: |
          SERVICE="${{ matrix.service }}"
          ALLOWED="uim-backend tm-backend orchestrator context-distiller agent-dispatcher agent-tools uim-frontend tm-frontend nginx"
          if ! echo "$ALLOWED" | grep -qw "$SERVICE"; then
            echo "ERROR: Unknown service name '${SERVICE}' — rejecting to prevent shell injection"
            exit 1
          fi

      - name: Resolve service paths
        id: paths
        run: |
          chmod +x .github/scripts/service-to-path.sh
          BUILD_PATH=$(.github/scripts/service-to-path.sh "${{ matrix.service }}" | tail -1)
          echo "build_path=${BUILD_PATH}" >> "$GITHUB_OUTPUT"

      # ── Python backend services ────────────────────────────────────────────
      - name: Set up Python 3.12
        if: >
          contains(fromJSON('["uim-backend","tm-backend","orchestrator","context-distiller","agent-dispatcher"]'), matrix.service)
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: >
          contains(fromJSON('["uim-backend","tm-backend","orchestrator","context-distiller","agent-dispatcher"]'), matrix.service)
        run: |
          cd ${{ steps.paths.outputs.build_path }}
          pip install -r requirements.txt

      - name: Run pytest (uim-backend / tm-backend / agent-dispatcher)
        if: >
          contains(fromJSON('["uim-backend","tm-backend","agent-dispatcher"]'), matrix.service)
        working-directory: ${{ steps.paths.outputs.build_path }}
        env:
          AUTH_MODE: local
          TEST_JWT_SECRET: ci-test-secret
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          OPENAI_API_KEY: test-key
          OPENAI_BASE_URL: http://localhost:9999
        run: pytest --cov --cov-fail-under=80

      - name: Run pytest (orchestrator / context-distiller — MongoDB-aware)
        if: >
          contains(fromJSON('["orchestrator","context-distiller"]'), matrix.service)
        working-directory: ${{ steps.paths.outputs.build_path }}
        env:
          AUTH_MODE: local
          TEST_JWT_SECRET: ci-test-secret
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          MONGO_URL: mongomock://localhost
          OPENAI_API_KEY: test-key
          OPENAI_BASE_URL: http://localhost:9999
        run: pytest --cov --cov-fail-under=80

      # ── Frontend services ──────────────────────────────────────────────────
      - name: Set up Node.js 20
        if: contains(fromJSON('["uim-frontend","tm-frontend"]'), matrix.service)
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ steps.paths.outputs.build_path }}/package-lock.json

      - name: Install frontend dependencies
        if: contains(fromJSON('["uim-frontend","tm-frontend"]'), matrix.service)
        working-directory: ${{ steps.paths.outputs.build_path }}
        run: npm ci

      - name: Run frontend tests (Vitest)
        if: contains(fromJSON('["uim-frontend","tm-frontend"]'), matrix.service)
        working-directory: ${{ steps.paths.outputs.build_path }}
        run: npm run test -- --run --coverage

      # ── Services with no test suite (nginx, agent-tools) ──────────────────
      - name: Skip (no test suite)
        if: contains(fromJSON('["nginx","agent-tools"]'), matrix.service)
        run: echo "No test suite for ${{ matrix.service }} — skipping test stage."

  # ─── Stage 4: Deploy (k3s / kubectl) ────────────────────────────────────────
  deploy:
    name: Deploy to k3s
    needs: [detect, test]
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install kubectl
        uses: azure/setup-kubectl@3e0aec4d80787158d308d7b364cb1381784a5774  # v4.0.0

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Deploy changed services
        env:
          SERVICES_JSON: ${{ needs.detect.outputs.services }}
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          SERVICES=$(echo "$SERVICES_JSON" | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin)))")

          # Service → k8s Deployment name + build path
          k8s_name() {
            case "$1" in
              uim-backend)       echo "user-input-manager" ;;
              tm-backend)        echo "ticket-manager" ;;
              orchestrator)      echo "orchestrator" ;;
              context-distiller) echo "context-distiller" ;;
              agent-dispatcher)  echo "agent-dispatcher" ;;
              agent-tools)       echo "agent-tools" ;;
              uim-frontend)      echo "uim-frontend" ;;
              tm-frontend)       echo "tm-frontend" ;;
              *)                 echo "$1" ;;
            esac
          }

          # Service → GHCR image name (matches k8s_name)
          image_name() { k8s_name "$1"; }

          # Migration-enabled backend services
          needs_migration() {
            case "$1" in
              uim-backend|tm-backend|orchestrator|context-distiller|agent-dispatcher) return 0 ;;
              *) return 1 ;;
            esac
          }

          ROLLBACK_NEEDED=""

          for SVC in $SERVICES; do
            K8S=$(k8s_name "$SVC")
            IMG="ghcr.io/${OWNER}/${K8S}:${SHA}"

            # ── 1. Resolve service build path ────────────────────────────────
            chmod +x .github/scripts/service-to-path.sh
            BUILD_PATH=$(.github/scripts/service-to-path.sh "$SVC" | tail -1)

            echo "=== Building ${K8S} from ${BUILD_PATH} ==="
            docker build -t "$IMG" "$BUILD_PATH"
            docker push "$IMG"

            # ── 2. Run Alembic migrations (before rollout) ───────────────────
            if needs_migration "$SVC"; then
              echo "=== Running Alembic migration for ${K8S} ==="
              JOB_NAME="alembic-${K8S}-${SHA:0:8}"
              if ! kubectl run "$JOB_NAME" \
                --image="$IMG" \
                --rm --restart=Never \
                -n dark-factory \
                --env-from=secret/dark-factory-secrets \
                --timeout=120s \
                -- alembic upgrade head; then
                echo "ERROR: Migration failed for ${K8S}. Aborting deploy."
                exit 1
              fi
            fi

            # ── 3. Update Deployment image ───────────────────────────────────
            echo "=== Updating Deployment ${K8S} ==="
            kubectl set image "deployment/${K8S}" "${K8S}=${IMG}" -n dark-factory

            # ── 4. Wait for rollout ──────────────────────────────────────────
            echo "=== Waiting for rollout: ${K8S} ==="
            if ! kubectl rollout status "deployment/${K8S}" -n dark-factory --timeout=120s; then
              echo "ERROR: Rollout failed for ${K8S}"
              ROLLBACK_NEEDED="$ROLLBACK_NEEDED $K8S"
            else
              echo "=== ${K8S} rolled out successfully ==="
            fi
          done

          # ── 5. Auto-rollback any failed Deployments ──────────────────────
          if [ -n "$ROLLBACK_NEEDED" ]; then
            echo "=== ROLLBACK: reverting failed deployments:${ROLLBACK_NEEDED} ==="
            for K8S in $ROLLBACK_NEEDED; do
              kubectl rollout undo "deployment/${K8S}" -n dark-factory
              echo "  Rolled back ${K8S}"
            done
            echo "=== Rollback complete. Pipeline exiting as failed. ==="
            exit 1
          fi

          echo "=== Deployment successful ==="
