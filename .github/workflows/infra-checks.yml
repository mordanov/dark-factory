name: Infra checks

on:
  push:
    paths:
      - 'infra/**'
      - 'development/**'
      - '.github/workflows/infra-checks.yml'
  pull_request:
    paths:
      - 'infra/**'
      - 'development/**'
      - '.github/workflows/infra-checks.yml'

jobs:
  auth-mode-check:
    name: AUTH_MODE=local must not appear in docker-compose.yml (BLK-03)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject AUTH_MODE=local in infra/docker-compose.yml
        run: |
          if grep -n 'AUTH_MODE=local' infra/docker-compose.yml; then
            echo "ERROR: AUTH_MODE=local found in infra/docker-compose.yml — all compose services must use AUTH_MODE=keycloak (constitution §XVII, BLK-03)"
            exit 1
          fi
          echo "OK: AUTH_MODE=local not found in infra/docker-compose.yml"

  compose-syntax:
    name: Validate docker-compose.yml syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check compose YAML parses
        run: python3 -c "import yaml,sys; yaml.safe_load(open('infra/docker-compose.yml')); print('YAML valid')"

  no-credentials-tracked:
    name: credentials.json must not be tracked in git (T-08 / NFR-06)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if any credentials.json is tracked
        run: |
          TRACKED=$(git ls-files 'development/**/credentials.json' 'development/*/credentials.json')
          if [ -n "$TRACKED" ]; then
            echo "ERROR: credentials.json file(s) found in git index — these must never be committed (NFR-06)"
            echo "$TRACKED"
            exit 1
          fi
          echo "OK: no credentials.json files tracked in git"
