name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticket_manager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install backend dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ticket_manager_test
          SECRET_KEY: ci-secret-key-not-used-in-production
          REFRESH_TOKEN_SECRET: ci-refresh-secret-not-used-in-production
          ENVIRONMENT: test
          LOG_LEVEL: WARNING
          TICKET_MANAGER_SERVICE_EMAIL: orchestrator@ci.internal
        run: alembic upgrade head

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ticket_manager_test
          SECRET_KEY: ci-secret-key-not-used-in-production
          REFRESH_TOKEN_SECRET: ci-refresh-secret-not-used-in-production
          ENVIRONMENT: test
          LOG_LEVEL: WARNING
          TICKET_MANAGER_SERVICE_EMAIL: orchestrator@ci.internal
        run: pytest -q --tb=short

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_TICKET_MANAGER_DIR: ${{ secrets.VPS_TICKET_MANAGER_DIR }}
          VPS_WEB_FOLDERS_DIR: ${{ secrets.VPS_WEB_FOLDERS_DIR }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "bash -se -- '$REPO' '$REF_NAME' '$VPS_TICKET_MANAGER_DIR' '$VPS_WEB_FOLDERS_DIR'" << 'EOF'

          set -e

          REPO="$1"
          REF_NAME="$2"
          TICKET_MANAGER_DIR="${3:-$HOME/ticket-manager}"
          WEB_FOLDERS_DIR="${4:-$HOME/web-folders}"

          PREVIOUS_COMMIT=""

          # --- Update dark-factory/ticket-manager repo ---
          mkdir -p "$TICKET_MANAGER_DIR"
          cd "$TICKET_MANAGER_DIR"

          if [ ! -d .git ]; then
            git clone "https://github.com/$REPO.git" .
          fi

          PREVIOUS_COMMIT=$(git rev-parse HEAD || echo "")

          git fetch origin --prune
          git checkout "$REF_NAME"
          git reset --hard "origin/$REF_NAME"

          # --- Update web-folders infra repo ---
          if [ ! -d "$WEB_FOLDERS_DIR/.git" ]; then
            echo "web-folders repo is missing at $WEB_FOLDERS_DIR"
            echo "Clone web-folders on VPS once, then rerun deployment"
            exit 1
          fi

          cd "$WEB_FOLDERS_DIR"
          PREVIOUS_WEB_FOLDERS_COMMIT=$(git rev-parse HEAD || echo "")
          git fetch origin --prune

          if git show-ref --verify --quiet refs/remotes/origin/main; then
            git checkout main
            git reset --hard origin/main
          else
            git pull --ff-only
          fi

          # --- Rebuild shared stack from web-folders ---
          cd "$WEB_FOLDERS_DIR"

          if ! docker compose config --services | grep -qx "ticket-manager-backend"; then
            echo "web-folders config is outdated: ticket-manager-backend service not found"
            echo "Update web-folders on VPS to include ticket-manager services and retry deployment"
            exit 1
          fi

          TICKET_MANAGER_HTTP_HOST="${TICKET_MANAGER_PRIMARY_DOMAIN:-ticket-manager.dark-factory.mainpage.local}"

          debug_dump() {
            docker compose ps || true
            docker compose logs --no-color --tail=200 ticket-manager-backend || true
            docker compose logs --no-color --tail=200 ticket-manager-frontend || true
            docker compose logs --no-color --tail=200 nginx || true
            docker compose logs --no-color --tail=200 recipes-db || true
          }

          wait_for_ticket_manager_health() {
            local retries=60
            local delay=2

            echo "Waiting for ticket-manager service via nginx (Host: ${TICKET_MANAGER_HTTP_HOST})..."
            for ((i=1; i<=retries; i++)); do
              if curl -fsS -H "Host: ${TICKET_MANAGER_HTTP_HOST}" http://localhost/ > /dev/null 2>&1; then
                echo "Health check passed"
                return 0
              fi
              sleep "$delay"
            done

            echo "Health check failed after $((retries * delay))s"
            return 1
          }

          echo "Building containers..."
          docker compose build ticket-manager-backend ticket-manager-frontend nginx
          docker compose up -d --remove-orphans

          if ! wait_for_ticket_manager_health; then
            echo "Health check failed -> rollback"
            debug_dump

            if [ -n "$PREVIOUS_COMMIT" ]; then
              cd "$TICKET_MANAGER_DIR"
              git reset --hard "$PREVIOUS_COMMIT"
              cd "$WEB_FOLDERS_DIR"
              docker compose build ticket-manager-backend ticket-manager-frontend nginx
              docker compose up -d --remove-orphans

              if wait_for_ticket_manager_health; then
                echo "Rollback recovered service successfully"
              else
                echo "Rollback completed, but service is still unhealthy"
                debug_dump
              fi
            fi

            exit 1
          fi

          docker compose ps
          EOF

      - name: Deploy notification
        if: success()
        run: echo "✅ Deployment to ${{ secrets.VPS_HOST }} completed successfully!"

      - name: Deploy failed notification
        if: failure()
        run: echo "❌ Deployment failed!"

# ──────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   VPS_SSH_KEY              — Private SSH key for deployment server access
#   VPS_HOST                 — Deployment server hostname or IP
#   VPS_USER                 — SSH username on deployment server
#   VPS_PORT                 — SSH port (default: 22)
#   VPS_TICKET_MANAGER_DIR   — Path to dark-factory/ticket-manager repo on VPS
#   VPS_WEB_FOLDERS_DIR      — Path to web-folders repo on VPS
#
# All runtime configuration lives in web-folders/.env on the VPS:
#   TICKET_MANAGER_PRIMARY_DOMAIN, TICKET_MANAGER_SERVER_NAMES
#   TICKET_MANAGER_POSTGRES_DB, TICKET_MANAGER_POSTGRES_USER, TICKET_MANAGER_POSTGRES_PASSWORD
#   TICKET_MANAGER_REPLICAS
#   TICKET_MANAGER_VITE_API_BASE_URL
# ──────────────────────────────────────────────────────────────────────────────
