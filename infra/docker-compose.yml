# Unified Dark Factory platform compose.
# Usage:
#   cp infra/.env.example infra/.env  # fill credentials
#   docker compose -f infra/docker-compose.yml up --build
# All healthchecks must pass within 60 seconds on pre-pulled images.

services:

  # ─── Identity / Auth Infrastructure ────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:?KC_DB_USERNAME is required}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD is required}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_LOG_LEVEL: INFO
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?KC_BOOTSTRAP_ADMIN_PASSWORD is required}
      KC_BOOTSTRAP_ADMIN_EMAIL: ${KC_BOOTSTRAP_ADMIN_EMAIL:-admin@dark-factory.local}
      UIM_FRONTEND_URL: ${UIM_FRONTEND_URL:-http://localhost:5173}
      TM_FRONTEND_URL: ${TM_FRONTEND_URL:-http://localhost:5174}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:?OAUTH2_PROXY_CLIENT_SECRET is required}
      KC_ORCHESTRATOR_CLIENT_SECRET: ${KC_ORCHESTRATOR_CLIENT_SECRET:?KC_ORCHESTRATOR_CLIENT_SECRET is required}
      KC_DISTILLER_CLIENT_SECRET: ${KC_DISTILLER_CLIENT_SECRET:?KC_DISTILLER_CLIENT_SECRET is required}
      KC_DISPATCHER_CLIENT_SECRET: ${KC_DISPATCHER_CLIENT_SECRET:?KC_DISPATCHER_CLIENT_SECRET is required}
      KC_AGENT_TOOLS_CLIENT_SECRET: ${KC_AGENT_TOOLS_CLIENT_SECRET:?KC_AGENT_TOOLS_CLIENT_SECRET is required}
      KC_UIM_CLIENT_SECRET: ${KC_UIM_CLIENT_SECRET:?KC_UIM_CLIENT_SECRET is required}
      KC_TM_CLIENT_SECRET: ${KC_TM_CLIENT_SECRET:?KC_TM_CLIENT_SECRET is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak-import-src/realm-export.json:ro
      - ./keycloak/substitute-env.sh:/opt/keycloak-import-src/substitute-env.sh:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        mkdir -p /opt/keycloak/data/import &&
        bash /opt/keycloak-import-src/substitute-env.sh &&
        exec /opt/keycloak/bin/kc.sh start --import-realm --db=postgres --db-url=jdbc:postgresql://postgres:5432/keycloak --db-username=$$KC_DB_USERNAME --db-password=$$KC_DB_PASSWORD --hostname=$$KC_HOSTNAME --hostname-strict=false --http-enabled=true --proxy=edge --log-level=INFO
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/dark-factory HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200' && exec 3>&-"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    expose:
      - "8080"
    networks:
      - internal

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:?OAUTH2_PROXY_CLIENT_SECRET is required}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:?OAUTH2_PROXY_COOKIE_SECRET is required}
    volumes:
      - ./oauth2-proxy/config.cfg:/etc/oauth2-proxy/config.cfg:ro
    command: ["--config=/etc/oauth2-proxy/config.cfg"]
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/oauth2-proxy", "--version"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    expose:
      - "4180"
    networks:
      - internal

  # ─── Databases ─────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Per-service DB credentials — used by 01_create_databases.sql on first boot
      UIM_DB_USER: ${UIM_DB_USER:?UIM_DB_USER is required}
      UIM_DB_PASSWORD: ${UIM_DB_PASSWORD:?UIM_DB_PASSWORD is required}
      TM_DB_USER: ${TM_DB_USER:?TM_DB_USER is required}
      TM_DB_PASSWORD: ${TM_DB_PASSWORD:?TM_DB_PASSWORD is required}
      ORCH_DB_USER: ${ORCH_DB_USER:?ORCH_DB_USER is required}
      ORCH_DB_PASSWORD: ${ORCH_DB_PASSWORD:?ORCH_DB_PASSWORD is required}
      DISTILLER_DB_USER: ${DISTILLER_DB_USER:?DISTILLER_DB_USER is required}
      DISTILLER_DB_PASSWORD: ${DISTILLER_DB_PASSWORD:?DISTILLER_DB_PASSWORD is required}
      DISPATCHER_DB_USER: ${DISPATCHER_DB_USER:?DISPATCHER_DB_USER is required}
      DISPATCHER_DB_PASSWORD: ${DISPATCHER_DB_PASSWORD:?DISPATCHER_DB_PASSWORD is required}
      KC_DB_USER: ${KC_DB_USERNAME:?KC_DB_USERNAME is required}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - internal

  mongo:
    image: mongo:7-jammy
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - internal

  # ─── Backend Services ───────────────────────────────────────────────────────

  user-input-manager:
    build:
      context: ../services/user-input-manager/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${UIM_DB_USER:?UIM_DB_USER is required}:${UIM_DB_PASSWORD:?UIM_DB_PASSWORD is required}@postgres:5432/df_user_input
      AUTH_MODE: keycloak
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: dark-factory
      KEYCLOAK_CLIENT_ID: user-input-manager
      KEYCLOAK_CLIENT_SECRET: ${KC_UIM_CLIENT_SECRET:?KC_UIM_CLIENT_SECRET is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      TICKET_MANAGER_BASE_URL: ${UIM_TM_URL:-http://ticket-manager:8000}
      CORS_ALLOW_ORIGINS: '["http://localhost","http://${UIM_HOST:-localhost}"]'
      PLANNING_MODEL: ${PLANNING_MODEL:-gpt-4o-mini}
      CONTEXT_DISTILLER_BASE_URL: ${CONTEXT_DISTILLER_BASE_URL:-http://context-distiller:8000}
      CONTEXT_DISTILLER_TIMEOUT_SECONDS: ${CONTEXT_DISTILLER_TIMEOUT_SECONDS:-10}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    expose:
      - "8000"
    networks:
      - internal

  ticket-manager:
    build:
      context: ../services/ticket-manager/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${TM_DB_USER:?TM_DB_USER is required}:${TM_DB_PASSWORD:?TM_DB_PASSWORD is required}@postgres:5432/df_ticket_manager
      AUTH_MODE: keycloak
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: dark-factory
      KEYCLOAK_CLIENT_ID: ticket-manager
      KEYCLOAK_CLIENT_SECRET: ${KC_TM_CLIENT_SECRET:?KC_TM_CLIENT_SECRET is required}
      CORS_ALLOW_ORIGINS: '["http://localhost","http://${TM_HOST:-localhost}"]'
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    expose:
      - "8000"
    networks:
      - internal

  orchestrator:
    build:
      context: ../services/orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${ORCH_DB_USER:?ORCH_DB_USER is required}:${ORCH_DB_PASSWORD:?ORCH_DB_PASSWORD is required}@postgres:5432/df_orchestrator
      DATABASE_URL_SYNC: postgresql://${ORCH_DB_USER:?ORCH_DB_USER is required}:${ORCH_DB_PASSWORD:?ORCH_DB_PASSWORD is required}@postgres:5432/df_orchestrator
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB_NAME: ${ORCH_MONGO_DB:-df_orchestrator_docs}
      AUTH_MODE: keycloak
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: dark-factory
      KEYCLOAK_CLIENT_ID: orchestrator
      KEYCLOAK_CLIENT_SECRET: ${KC_ORCHESTRATOR_CLIENT_SECRET:?KC_ORCHESTRATOR_CLIENT_SECRET is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      TICKET_MANAGER_BASE_URL: http://ticket-manager:8000
      CORS_ALLOW_ORIGINS: '["http://localhost"]'
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    expose:
      - "8000"
    networks:
      - internal

  context-distiller:
    build:
      context: ../services/context-distiller
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${DISTILLER_DB_USER:?DISTILLER_DB_USER is required}:${DISTILLER_DB_PASSWORD:?DISTILLER_DB_PASSWORD is required}@postgres:5432/df_distiller
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB_NAME: ${DISTILLER_MONGO_DB:-df_distiller_docs}
      AUTH_MODE: keycloak
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: dark-factory
      KEYCLOAK_CLIENT_ID: context-distiller
      KEYCLOAK_CLIENT_SECRET: ${KC_DISTILLER_CLIENT_SECRET:?KC_DISTILLER_CLIENT_SECRET is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      TICKET_MANAGER_BASE_URL: http://ticket-manager:8000
      CORS_ALLOW_ORIGINS: '["http://localhost"]'
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    expose:
      - "8000"
    networks:
      - internal

  agent-tools:
    build:
      context: ../services/agent-tools
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AUTH_MODE: keycloak
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: dark-factory
      KEYCLOAK_CLIENT_ID: agent-tools
      KEYCLOAK_CLIENT_SECRET: ${KC_AGENT_TOOLS_CLIENT_SECRET:?KC_AGENT_TOOLS_CLIENT_SECRET is required}
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    expose:
      - "8000"
    networks:
      - internal

  agent-dispatcher:
    build:
      context: ../services/agent-dispatcher
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${DISPATCHER_DB_USER:?DISPATCHER_DB_USER is required}:${DISPATCHER_DB_PASSWORD:?DISPATCHER_DB_PASSWORD is required}@postgres:5432/df_dispatcher
      AUTH_MODE: keycloak
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: dark-factory
      KEYCLOAK_CLIENT_ID: agent-dispatcher
      KEYCLOAK_CLIENT_SECRET: ${KC_DISPATCHER_CLIENT_SECRET:?KC_DISPATCHER_CLIENT_SECRET is required}
      ORCHESTRATOR_BASE_URL: ${DISPATCHER_ORCHESTRATOR_URL:-http://orchestrator:8000}
      TICKET_MANAGER_BASE_URL: ${DISPATCHER_TM_URL:-http://ticket-manager:8000}
      CONTEXT_DISTILLER_BASE_URL: ${DISPATCHER_DISTILLER_URL:-http://context-distiller:8000}
      AGENT_RUNNER_MODE: ${AGENT_RUNNER_MODE:-claude_code}
      AGENT_PROMPTS_DIR: ${AGENT_PROMPTS_DIR:-/app/prompts}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-10}
      WORKER_MAX_CONCURRENT_RUNS: ${WORKER_MAX_CONCURRENT_RUNS:-3}
      AGENT_TIMEOUT_DEFAULT: ${AGENT_TIMEOUT_DEFAULT:-300}
      BRAINSTORM_MAX_ROUNDS: ${BRAINSTORM_MAX_ROUNDS:-3}
      BRAINSTORM_AGENTS: ${BRAINSTORM_AGENTS:-software_architect,security_architect}
      CONTEXT_MAX_TOKENS: ${CONTEXT_MAX_TOKENS:-6000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      CORS_ALLOW_ORIGINS: '["http://localhost"]'
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    expose:
      - "8000"
    networks:
      - internal

  # ─── Frontend Services ──────────────────────────────────────────────────────

  uim-frontend:
    build:
      context: ../services/user-input-manager/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    expose:
      - "80"
    networks:
      - internal

  tm-frontend:
    build:
      context: ../services/ticket-manager/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    expose:
      - "80"
    networks:
      - internal

  # ─── Reverse Proxy ──────────────────────────────────────────────────────────

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      UIM_HOST: ${UIM_HOST:-studio.dark-factory.local}
      TM_HOST: ${TM_HOST:-tickets.dark-factory.local}
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      user-input-manager:
        condition: service_healthy
      ticket-manager:
        condition: service_healthy
      uim-frontend:
        condition: service_healthy
      tm-frontend:
        condition: service_healthy
      oauth2-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - external

volumes:
  postgres_data:
  mongo_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
