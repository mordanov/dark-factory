[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "I", "UP"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["E501"]
# Operational tooling — not production service code
"**/project-administrator/**/*.py" = ["E501", "UP"]
"**/agents/**/*.py" = ["E501", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

# Canonical dependency versions for all Python services.
# Services must pin to exactly these versions in their requirements.txt.
[tool.versions]
fastapi = "0.115.5"
uvicorn = "0.32.1"
sqlalchemy = "2.0.36"
asyncpg = "0.30.0"
alembic = "1.14.0"
pydantic = "2.10.3"
pydantic-settings = "2.7.0"
python-jose = "3.3.0"
passlib = "1.7.4"
bcrypt = "4.2.1"
structlog = "24.4.0"
httpx = "0.28.0"
openai = "1.59.9"
motor = "3.7.0"
pymongo = "4.10.1"
pytest = "8.3.4"
pytest-asyncio = "0.24.0"
pytest-cov = "6.0.0"
ruff = "0.8.3"
